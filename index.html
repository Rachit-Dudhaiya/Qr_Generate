<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <div class="card">
      <div class="left">
        <div class="header">
          <div class="logo">QR</div>
          <div class="title">
            <h1>QR Code Generator</h1>
            <p>Generate and download QR codes quickly</p>
          </div>
        </div>

        <label class="field-label">Enter a URL or link</label>
        <input id="urlInput" type="text" placeholder="https://example.com">

        <div class="actions">
          <button id="generateBtn" class="btn primary">Generate QR</button>
          <button id="resetBtn" class="btn">Reset</button>
        </div>

        <p class="tip">Tip: paste a Google Sheet or file link to encode it.</p>
      </div>

      <div class="right">
        <div class="preview-title">Preview</div>
        <div class="preview" id="preview">
          <span class="placeholder">Your generated QR will appear here.</span>
        </div>
        <a id="downloadLink" class="download" href="#" download="qrcode.png" hidden>Download</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
